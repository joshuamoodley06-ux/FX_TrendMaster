name: Task C PR37 Verification

on:
  pull_request:
    branches:
      - feat/structural-chart-navigation-v01

concurrency:
  group: task-c-pr37-verification
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 40
    env:
      BASE_SHA: a3617684d1e84bec22c8f1689a5619eb6ecb1f06
      TASK_C_SHA: 0112d7486c5cf4d2b2198d2df91c7063ccd52525
    steps:
      - name: Checkout exact Task C head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TASK_C_SHA }}
          fetch-depth: 0

      - name: Confirm exact checkout and base ancestry
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TASK_C_SHA"
          git merge-base --is-ancestor "$BASE_SHA" HEAD
          echo "checkout=$(git rev-parse HEAD)" >> "$GITHUB_STEP_SUMMARY"
          echo "base=$BASE_SHA" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify committed scope and private-data hygiene
        shell: bash
        run: |
          set -euo pipefail
          expected="$(mktemp)"
          actual="$(mktemp)"
          cat > "$expected" <<'FILES'
          electron/src/structuralChartNavigation.test.ts
          electron/src/structuralChartNavigation.ts
          electron/src/structuralJumpTarget.test.ts
          electron/src/structuralJumpTarget.ts
          FILES
          git diff --name-only "$BASE_SHA"...HEAD | sort > "$actual"
          diff -u "$expected" "$actual"

          forbidden='(^|/)(main\.tsx|candleLoadPolicy\.ts|localCandleLibrary\.ts|chartMemory\.ts|chartViewportPolicy\.ts|rawMapping\.ts|inspectorCommit\.ts|structuralRangeLifecycle\.ts)$'
          if grep -Eq "$forbidden" "$actual"; then
            echo "Forbidden production path changed" >&2
            exit 1
          fi

          if grep -Eqi '\.(env|pem|key|p12|pfx|db|sqlite|sqlite3|csv|zip|7z|tar|gz|exe|dll)$' "$actual"; then
            echo "Generated/private-looking file committed" >&2
            exit 1
          fi

          if git diff "$BASE_SHA"...HEAD -- \
            electron/src/structuralChartNavigation.ts \
            electron/src/structuralChartNavigation.test.ts \
            electron/src/structuralJumpTarget.ts \
            electron/src/structuralJumpTarget.test.ts \
            | grep -Eqi 'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|AKIA[0-9A-Z]{16}|github_pat_|ghp_[A-Za-z0-9]{20,}|(^|[^A-Za-z])(password|secret|api[_-]?key)[[:space:]]*[:=][[:space:]]*["'"'][^"'"']+["'"']'; then
            echo "Potential secret/private data detected in committed diff" >&2
            exit 1
          fi

          echo "changed_files=4" >> "$GITHUB_STEP_SUMMARY"
          sed 's/^/- /' "$actual" >> "$GITHUB_STEP_SUMMARY"

      - name: Git diff check
        shell: bash
        run: |
          set -euo pipefail
          git diff --check "$BASE_SHA"...HEAD
          git diff --check
          echo "git_diff_check=PASS" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install exact locked test and build dependencies
        working-directory: electron
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .task-c-deps .task-c-verification
          node <<'NODE'
          const fs = require('fs');
          const lock = require('./package-lock.json');
          const root = lock.packages?.[''] || {};
          const direct = new Set([
            ...Object.keys(root.dependencies || {}),
            ...Object.keys(root.devDependencies || {}),
          ]);
          for (const name of ['electron-builder', 'concurrently', 'wait-on']) direct.delete(name);
          const dependencies = {};
          for (const name of [...direct].sort()) {
            const entry = lock.packages?.[`node_modules/${name}`];
            if (!entry?.version) throw new Error(`No locked version for ${name}`);
            dependencies[name] = entry.version;
          }
          fs.writeFileSync('.task-c-deps/package.json', JSON.stringify({ private: true, dependencies }, null, 2));
          console.log(dependencies);
          NODE
          npm install --prefix .task-c-deps --ignore-scripts --no-audit --no-fund --package-lock=false 2>&1 | tee .task-c-verification/install.log
          npm rebuild --prefix .task-c-deps esbuild --no-audit --no-fund
          mkdir -p .task-c-deps/node_modules/electron/dist
          printf 'electron.exe' > .task-c-deps/node_modules/electron/path.txt
          touch .task-c-deps/node_modules/electron/dist/electron.exe
          cmd //c "mklink /J node_modules .task-c-deps\\node_modules"

      - name: Focused structural navigation tests
        working-directory: electron
        shell: bash
        run: |
          set +e
          npx vitest run src/structuralJumpTarget.test.ts src/structuralChartNavigation.test.ts 2>&1 | tee .task-c-verification/focused.log
          status=${PIPESTATUS[0]}
          echo "$status" > .task-c-verification/focused.status
          exit 0

      - name: Full Electron test suite
        working-directory: electron
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee .task-c-verification/full-suite.log
          status=${PIPESTATUS[0]}
          echo "$status" > .task-c-verification/full-suite.status
          exit 0

      - name: Electron build
        working-directory: electron
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee .task-c-verification/build.log
          status=${PIPESTATUS[0]}
          echo "$status" > .task-c-verification/build.status
          exit 0

      - name: Post-build repository check
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff --exit-code
          git diff --cached --exit-code
          echo "post_build_tracked_tree=clean" >> "$GITHUB_STEP_SUMMARY"
          echo "untracked_after_build:" >> "$GITHUB_STEP_SUMMARY"
          git ls-files --others --exclude-standard | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY" || true

      - name: Enforce verification results
        shell: bash
        run: |
          set -euo pipefail
          focused="$(cat electron/.task-c-verification/focused.status)"
          full="$(cat electron/.task-c-verification/full-suite.status)"
          build="$(cat electron/.task-c-verification/build.status)"
          echo "focused_status=$focused" >> "$GITHUB_STEP_SUMMARY"
          echo "full_suite_status=$full" >> "$GITHUB_STEP_SUMMARY"
          echo "build_status=$build" >> "$GITHUB_STEP_SUMMARY"
          echo "Focused summary:"
          grep -E 'Test Files|Tests|Duration' electron/.task-c-verification/focused.log | tail -n 3 || true
          echo "Full suite summary:"
          grep -E 'Test Files|Tests|Duration' electron/.task-c-verification/full-suite.log | tail -n 3 || true
          echo "Build summary:"
          tail -n 12 electron/.task-c-verification/build.log || true
          test "$focused" = "0"
          test "$full" = "0"
          test "$build" = "0"

      - name: Prepare verification artifact
        if: always()
        shell: bash
        run: |
          mkdir -p task-c-verification-logs
          cp -f electron/.task-c-verification/* task-c-verification-logs/ 2>/dev/null || true

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task-c-pr37-windows-verification-logs
          path: task-c-verification-logs
          if-no-files-found: warn
          retention-days: 1
