name: Apply Parent Resolver V2 Patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply regression patch
        run: python tools/apply_parent_resolver_v2_patch.py

      - name: Remove temporary patch files
        run: |
          rm tools/apply_parent_resolver_v2_patch.py
          rm python/range_library_memory/parent_conflict_resolver_v2.py
          rm .github/workflows/tmp-apply-parent-resolver-v2.yml

      - name: Install test dependency
        run: python -m pip install pytest

      - name: Run full Python suite
        env:
          PYTHONPATH: python
        run: python -m pytest python/range_library_memory/tests -q

      - name: Commit patched resolver
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: preserve parent context across resolver rebuild"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
