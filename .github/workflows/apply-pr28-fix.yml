name: Apply PR 28 Integrity Fix

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'feat/weekly-direction-daily-relationship-v01'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/weekly-direction-daily-relationship-v01
          fetch-depth: 0
      - name: Apply exact integrity fixes
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .pr28_fix3.b64 | tar -xz -C python
          rm .pr28_fix3.b64
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: restore exact Weekly direction implementation"
          git push origin HEAD:feat/weekly-direction-daily-relationship-v01
