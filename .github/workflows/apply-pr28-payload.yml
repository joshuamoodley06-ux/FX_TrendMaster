name: Diagnose PR 28 Payload

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'feat/weekly-direction-daily-relationship-v01'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/weekly-direction-daily-relationship-v01
          fetch-depth: 0
      - name: Diagnose staged payload
        shell: bash
        run: |
          set +e
          {
            echo "PWD=$(pwd)"
            ls -la .pr28_payload.b64
            wc -c .pr28_payload.b64
            base64 -d .pr28_payload.b64 > /tmp/pr28_payload.tar.gz
            echo "decode_exit=$?"
            gzip -t /tmp/pr28_payload.tar.gz
            echo "gzip_exit=$?"
            tar -tzf /tmp/pr28_payload.tar.gz
            echo "list_exit=$?"
            tar -xzf /tmp/pr28_payload.tar.gz
            echo "extract_exit=$?"
            git status --short
          } > pr28-diagnostic.log 2>&1
          cat pr28-diagnostic.log
          exit 0
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: pr28-payload-diagnostic
          path: pr28-diagnostic.log
          if-no-files-found: error
          retention-days: 1
