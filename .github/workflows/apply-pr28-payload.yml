name: Apply PR 28 Payload

on:
  push:
    branches:
      - feat/weekly-direction-daily-relationship-v01

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/weekly-direction-daily-relationship-v01
          fetch-depth: 0
      - name: Apply staged payload and commit
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .pr28_payload.b64 | tar -xz
          rm .pr28_payload.b64
          rm .github/workflows/apply-pr28-payload.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add Weekly direction and Daily trend relationships"
          git push origin HEAD:feat/weekly-direction-daily-relationship-v01
