name: Diagnose Remaining PR 28 Payload

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'feat/weekly-direction-daily-relationship-v01'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/weekly-direction-daily-relationship-v01
          fetch-depth: 0
      - name: Diagnose remaining payload
        shell: bash
        run: |
          set +e
          {
            wc -c .pr28_missing_payload.b64
            sha256sum .pr28_missing_payload.b64
            base64 -d .pr28_missing_payload.b64 > /tmp/pr28_missing.tar.gz
            echo "decode_exit=$?"
            sha256sum /tmp/pr28_missing.tar.gz
            gzip -t /tmp/pr28_missing.tar.gz
            echo "gzip_exit=$?"
            tar -tzf /tmp/pr28_missing.tar.gz
            echo "list_exit=$?"
            tar -xzf /tmp/pr28_missing.tar.gz -C python
            echo "extract_exit=$?"
            git status --short
          } > pr28-missing-diagnostic.log 2>&1
          cat pr28-missing-diagnostic.log
          exit 0
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: pr28-missing-diagnostic
          path: pr28-missing-diagnostic.log
          if-no-files-found: error
          retention-days: 1
