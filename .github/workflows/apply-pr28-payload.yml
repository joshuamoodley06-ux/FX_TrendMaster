name: Apply PR 28 Payload

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'feat/weekly-direction-daily-relationship-v01'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/weekly-direction-daily-relationship-v01
          fetch-depth: 0
      - name: Apply staged payload and commit
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f .pr28_payload.b64 ]; then
            echo "Payload already applied."
            exit 0
          fi
          cat .pr28_payload.b64 .pr28_payload.tail | base64 -d | tar -xz
          rm .pr28_payload.b64 .pr28_payload.tail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add Weekly direction and Daily trend relationships"
          git push origin HEAD:feat/weekly-direction-daily-relationship-v01
