name: Export Remaining PR 28 Payload

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    if: github.event.pull_request.head.ref == 'feat/weekly-direction-daily-relationship-v01'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/weekly-direction-daily-relationship-v01
      - name: Upload exact staged files
        uses: actions/upload-artifact@v4
        with:
          name: pr28-staged-payload-files
          path: |
            .pr28_missing_payload.b64
            .pr28_missing_payload.tail
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1
