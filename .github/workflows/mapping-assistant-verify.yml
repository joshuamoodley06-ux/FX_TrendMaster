name: Mapping Assistant Verify

on:
  push:
    branches:
      - feat/mapping-assistant-gap-bridge-v01
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install test runner
        run: python -m pip install --upgrade pip pytest
      - name: Compile Python
        run: python -m compileall python
      - name: Focused Mapping Assistant tests
        env:
          PYTHONPATH: python
        run: python -m pytest python/range_library_memory/tests/test_xauusd_mapping_assistant.py python/range_library_memory/tests/test_xauusd_first_query_doctrine.py -q
      - name: Full Python suite
        env:
          PYTHONPATH: python
        run: python -m pytest python -q

  electron:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Electron dependencies from public npm
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          npm_config_registry: https://registry.npmjs.org/
        run: npm install --no-package-lock
      - name: Mapping Assistant model tests
        run: npx vitest run src/mappingAssistantModel.test.ts
      - name: Mapping Assistant panel tests
        run: npx vitest run src/mappingAssistantPanel.test.ts
      - name: Mapping Assistant legacy navigation tests
        run: npx vitest run src/mappingAssistantLegacyNavigation.test.ts
      - name: Mapping Assistant navigation integration tests
        run: npx vitest run src/mappingAssistantNavigationIntegration.test.ts
      - name: Hierarchy workspace tests
        run: npx vitest run src/hierarchyWorkspace.test.ts
      - name: Existing Master Map hierarchy tests
        run: npx vitest run src/masterMapHierarchy.test.ts
      - name: Existing Master Map navigation tests
        run: |
          mkdir -p ../artifacts
          npx vitest run src/masterMapNavigationIntegration.test.ts --reporter=json --outputFile=../artifacts/master-map-navigation.json
      - name: Upload Master Map navigation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: master-map-navigation-diagnostics
          path: artifacts/master-map-navigation.json
          if-no-files-found: warn
      - name: IPC tests
        run: |
          mkdir -p ../artifacts
          npx vitest run src/localResearchIpc.test.ts --reporter=json --outputFile=../artifacts/local-research-ipc.json
      - name: Upload IPC diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-research-ipc-diagnostics
          path: artifacts/local-research-ipc.json
          if-no-files-found: warn
      - name: Structural target tests
        run: npx vitest run src/structuralJumpTarget.test.ts
      - name: Build local runner
        run: npm run build:runner
      - name: Portable Electron suite
        run: |
          mkdir -p ../artifacts
          npx vitest run --exclude src/localPythonRunner.test.ts --reporter=json --outputFile=../artifacts/portable-electron-suite.json
      - name: Upload portable Electron diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portable-electron-suite-diagnostics
          path: artifacts/portable-electron-suite.json
          if-no-files-found: warn
      - name: Production build
        run: npm run build

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Diff whitespace check
        run: git diff --check origin/main...HEAD
      - name: Private path scan
        run: |
          if git diff --unified=0 origin/main...HEAD -- electron python | grep -E 'C:\\Users\\|/Users/|/home/|OneDrive\\Documents' ; then
            echo 'Private path found in product diff.' >&2
            exit 1
          fi
