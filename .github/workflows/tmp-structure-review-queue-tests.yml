name: Temporary Structure Review Queue Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/unified-structure-review-queue-v01
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply focused fixture patch
        run: python .github/tmp_patch_review_queue_tests.py
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Run focused review queue tests
        env:
          PYTHONPATH: python
        run: python -m pytest python/range_library_memory/tests/test_structure_review_queue.py -q
      - name: Run full Range Library Memory suite
        env:
          PYTHONPATH: python
        run: python -m pytest python/range_library_memory/tests -q
      - name: Commit fixture isolation patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add python/range_library_memory/tests/test_structure_review_queue.py
          if git diff --cached --quiet; then
            echo "No fixture patch to commit."
          else
            git commit -m "test: isolate generated duplicate candidates"
            git push origin HEAD:feat/unified-structure-review-queue-v01
          fi
