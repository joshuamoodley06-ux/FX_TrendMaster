name: Temporary Structure Review Queue Tests

on:
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Run focused review queue tests
        env:
          PYTHONPATH: python
        shell: bash
        run: |
          set +e
          python -m pytest python/range_library_memory/tests/test_structure_review_queue.py -q --tb=short > focused-review-queue.log 2>&1
          code=$?
          cat focused-review-queue.log
          echo "FOCUSED_EXIT_CODE=$code" >> "$GITHUB_ENV"
          exit 0
      - name: Upload focused test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: focused-review-queue-log
          path: focused-review-queue.log
      - name: Stop if focused tests failed
        shell: bash
        run: |
          if [ "${FOCUSED_EXIT_CODE}" != "0" ]; then
            exit "${FOCUSED_EXIT_CODE}"
          fi
      - name: Run full Range Library Memory suite
        env:
          PYTHONPATH: python
        run: python -m pytest python/range_library_memory/tests -q
