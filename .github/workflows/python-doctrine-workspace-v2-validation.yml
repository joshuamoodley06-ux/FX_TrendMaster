name: Python Doctrine Workspace V2 Validation

on:
  push:
    branches:
      - fix/python-doctrine-workspace-v2
  workflow_dispatch:

jobs:
  python-focused:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pytest
      - run: python -m pytest range_library_memory/tests/test_doctrine_pipeline.py -q

  electron:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - run: npm ci
      - name: Focused tests
        run: npx vitest run src/doctrineWorkspace.test.ts src/masterMapAdapter.test.ts src/localResearchIpc.test.ts
      - name: Full Electron tests
        run: npm test
      - name: Electron build
        run: npm run build
