name: Temporary review case isolation verification

on:
  push:
    branches:
      - fix/review-case-isolation-v01
    paths:
      - .github/workflows/temporary-review-case-isolation.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify-and-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/review-case-isolation-v01
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update legacy review-key assertion
        run: python .github/temporary/fix_case_isolation_test.py

      - name: Install test runner
        run: python -m pip install --disable-pip-version-check pytest

      - name: Compile Python package
        run: python -m compileall -q python/range_library_memory

      - name: Run focused case isolation tests
        env:
          PYTHONPATH: python
        run: >-
          python -m pytest
          python/range_library_memory/tests/test_case_isolation_regressions.py
          python/range_library_memory/tests/test_parent_conflict_resolver.py
          python/range_library_memory/tests/test_structure_review_queue.py
          -q

      - name: Run complete Range Library Memory suite
        env:
          PYTHONPATH: python
        run: python -m pytest python/range_library_memory/tests -q

      - name: Commit verified patch and remove temporary machinery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add python/range_library_memory/tests/test_structure_review_queue.py
          git rm .github/temporary/apply_review_case_isolation_patch.py \
                 .github/temporary/fix_case_isolation_test.py \
                 .github/temporary/case-isolation-test-output.txt \
                 .github/workflows/temporary-review-case-isolation.yml
          git commit -m "test: align review queue history with case-scoped keys"
          git push origin HEAD:fix/review-case-isolation-v01
