name: Temporary review case isolation patch

on:
  push:
    branches:
      - fix/review-case-isolation-v01
    paths:
      - .github/workflows/temporary-review-case-isolation.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/review-case-isolation-v01
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply deterministic patch
        run: python .github/temporary/apply_review_case_isolation_patch.py

      - name: Install test runner
        run: python -m pip install --disable-pip-version-check pytest

      - name: Compile Python package
        run: python -m compileall -q python/range_library_memory

      - name: Run focused tests and capture output
        id: focused
        continue-on-error: true
        env:
          PYTHONPATH: python
        run: |
          set -o pipefail
          python -m pytest \
            python/range_library_memory/tests/test_case_isolation_regressions.py \
            python/range_library_memory/tests/test_parent_conflict_resolver.py \
            python/range_library_memory/tests/test_structure_review_queue.py \
            -q 2>&1 | tee .github/temporary/case-isolation-test-output.txt

      - name: Commit applied patch and focused test evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add python/range_library_memory/parent_conflict_resolver.py \
                  python/range_library_memory/structure_review_queue.py \
                  python/range_library_memory/tests/test_case_isolation_regressions.py \
                  .github/temporary/case-isolation-test-output.txt
          git commit -m "test: expose review case isolation patch"
          git push origin HEAD:fix/review-case-isolation-v01

      - name: Fail when focused tests failed
        if: steps.focused.outcome != 'success'
        run: exit 1

      - name: Run complete Range Library Memory suite
        env:
          PYTHONPATH: python
        run: python -m pytest python/range_library_memory/tests -q
