name: Temporary Review Queue Flood Patch

on:
  push:
    branches: [feat/unified-structure-review-queue-v01]

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/unified-structure-review-queue-v01
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply queue flood patch
        run: python .github/tmp_patch_review_queue_flood.py
      - name: Install pytest
        run: python -m pip install pytest
      - name: Run focused queue tests
        env:
          PYTHONPATH: python
        run: python -m pytest python/range_library_memory/tests/test_structure_review_queue.py -q
      - name: Run full Range Library Memory suite
        env:
          PYTHONPATH: python
        run: python -m pytest python/range_library_memory/tests -q
      - name: Commit tested patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add python/range_library_memory/structure_review_queue.py python/range_library_memory/tests/test_structure_review_queue.py
          if git diff --cached --quiet; then
            echo "No patch changes to commit."
          else
            git commit -m "fix: keep review queue focused on current root causes"
            git push origin HEAD:feat/unified-structure-review-queue-v01
          fi
