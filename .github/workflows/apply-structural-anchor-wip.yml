name: Apply structural anchor WIP

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - automation/structural-anchor-wip

permissions:
  contents: write
  pull-requests: read

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/structural-anchor-draft-integrity-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout WIP head branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: fix/structural-anchor-draft-integrity-v1

      - name: Decode patch payload
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import zlib

          encoded = Path('.github/wip/structural_anchor_draft_integrity.patch.zlib.b64').read_text(encoding='utf-8').strip()
          patch = zlib.decompress(base64.b64decode(encoded))
          Path('/tmp/structural_anchor_draft_integrity.patch').write_bytes(patch)
          print(f'decoded patch bytes={len(patch)}')
          PY

      - name: Apply focused mapping patch
        shell: bash
        run: |
          git apply --check /tmp/structural_anchor_draft_integrity.patch
          git apply --whitespace=fix /tmp/structural_anchor_draft_integrity.patch
          git diff --check

      - name: Install Electron dependencies
        working-directory: electron
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Run focused tests
        working-directory: electron
        shell: bash
        run: npx vitest run src/structuralRangeDraftSession.test.ts src/mapStudioMappingContext.test.ts

      - name: Build Electron renderer
        working-directory: electron
        shell: bash
        run: npm run build

      - name: Remove generated and temporary WIP automation files
        shell: bash
        run: |
          git restore --worktree -- electron/electron/localPythonRunner.cjs || true
          rm -f .github/wip/structural_anchor_draft_integrity.patch.zlib.b64
          rm -f .github/workflows/wip-apply-structural-anchor-integrity.yml
          rm -f .github/workflows/placeholder.txt
          rmdir .github/wip 2>/dev/null || true
          git diff --check

      - name: Commit WIP implementation to head branch
        shell: bash
        run: |
          git config user.name "FXTM WIP Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --name-only
          git commit -m "WIP: preserve structural anchor draft integrity"
          git push origin HEAD:fix/structural-anchor-draft-integrity-v1
