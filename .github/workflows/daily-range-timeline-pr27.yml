name: Daily Range Timeline PR 27

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feat/daily-range-timeline-v01
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest
      - name: Run Range Library Memory tests
        env:
          PYTHONPATH: python
        run: python -m pytest python/range_library_memory/tests --basetemp .pytest-tmp | tee pytest-output.txt
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-range-timeline-test-output
          path: pytest-output.txt
          if-no-files-found: error
          retention-days: 1
