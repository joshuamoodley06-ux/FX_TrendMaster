name: Daily Range Timeline PR 27

on:
  push:
    branches:
      - feat/daily-range-timeline-v01
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest
      - name: Run Range Library Memory tests
        env:
          PYTHONPATH: python
        run: python -m pytest python/range_library_memory/tests --basetemp .pytest-tmp
