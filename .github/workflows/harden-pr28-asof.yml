name: Validate Final PR 28

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feat/weekly-direction-daily-relationship-v01
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/weekly-direction-daily-relationship-v01
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest
      - name: Run complete Range Library Memory suite
        env:
          PYTHONPATH: python
        shell: bash
        run: |
          set -o pipefail
          python -m pytest python/range_library_memory/tests --basetemp .pytest-tmp | tee pytest-output.txt
      - name: Upload final source and test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr28-final-validation
          path: |
            pytest-output.txt
            python/range_library_memory/weekly_direction_context.py
            python/range_library_memory/daily_trend_relationship.py
            python/range_library_memory/schema.py
            python/range_library_memory/cli.py
            python/range_library_memory/tests/test_weekly_direction_context.py
            python/range_library_memory/tests/test_daily_trend_relationship.py
            python/range_library_memory/tests/test_direction_relationship_cli.py
          if-no-files-found: warn
          retention-days: 1
