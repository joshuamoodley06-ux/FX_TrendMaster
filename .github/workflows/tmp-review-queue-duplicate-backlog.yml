name: Temporary Review Queue Duplicate Backlog Patch

on:
  push:
    branches: [feat/unified-structure-review-queue-v01]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/unified-structure-review-queue-v01
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply duplicate backlog patch
        run: python .github/tmp_patch_review_queue_duplicate_backlog.py
      - name: Install pytest
        run: python -m pip install pytest
      - name: Run focused queue tests
        env:
          PYTHONPATH: python
        shell: bash
        run: |
          set +e
          python -m pytest python/range_library_memory/tests/test_structure_review_queue.py -q --tb=short > focused-duplicate-backlog.log 2>&1
          code=$?
          cat focused-duplicate-backlog.log
          echo "FOCUSED_EXIT_CODE=$code" >> "$GITHUB_ENV"
          exit 0
      - name: Upload focused test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: focused-duplicate-backlog-log
          path: focused-duplicate-backlog.log
      - name: Stop if focused tests failed
        shell: bash
        run: |
          if [ "${FOCUSED_EXIT_CODE}" != "0" ]; then
            exit "${FOCUSED_EXIT_CODE}"
          fi
      - name: Run full Range Library Memory suite
        env:
          PYTHONPATH: python
        run: python -m pytest python/range_library_memory/tests -q
      - name: Commit tested patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add python/range_library_memory/structure_review_queue.py python/range_library_memory/tests/test_structure_review_queue.py
          if git diff --cached --quiet; then
            echo "No patch changes to commit."
          else
            git commit -m "fix: aggregate duplicate audit backlog"
            git push origin HEAD:feat/unified-structure-review-queue-v01
          fi
