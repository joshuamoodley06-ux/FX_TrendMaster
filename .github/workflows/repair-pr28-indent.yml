name: Repair PR 28 As Of Indentation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.ref == 'feat/weekly-direction-daily-relationship-v01'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/weekly-direction-daily-relationship-v01
          fetch-depth: 0
      - name: Repair exact Python blocks
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def find_line(lines, text, start=0):
              for index in range(start, len(lines)):
                  if lines[index].strip() == text:
                      return index
              raise RuntimeError(f"Missing line: {text}")

          weekly = Path("python/range_library_memory/weekly_direction_context.py")
          lines = weekly.read_text().splitlines()
          start = find_line(lines, "if parse_time(break_time) > parse_time(cutoff):")
          end = find_line(lines, 'reclaim = latest_break_reclaim(connection, str(link["old_range_id"]))', start)
          lines[start:end] = [
              "    if parse_time(break_time) > parse_time(cutoff):",
              '        return finish(row, "UNRESOLVED", "INCOMPLETE", "UNRESOLVED", "low", reasons | {"CREATION_BREAK_AFTER_AS_OF"})',
              "    row.update(",
              "        creation_break_direction=direction,",
              "        creation_break_time=break_time,",
              '        creation_break_level=float(evidence["boundary_price"]),',
              '        creation_break_kind=evidence["effective_break_kind"],',
              "        pending_from_time=break_time,",
              '        supporting_event_evidence_id=evidence["id"],',
              "    )",
              "",
          ]
          start = find_line(lines, "if parse_time(reclaim_time) <= parse_time(cutoff):")
          end = find_line(lines, 'if reclaim["current_state"] == PENDING_STATE:', start)
          lines[start:end] = [
              "        if parse_time(reclaim_time) <= parse_time(cutoff):",
              "            row.update(",
              "                creation_reclaim_time=reclaim_time,",
              '                creation_reclaim_kind=reclaim["effective_reclaim_kind"],',
              "                confirmed_from_time=reclaim_time,",
              "            )",
              '            return finish(row, f"CONFIRMED_{direction}", "OBSERVED", "RESOLVED", confidence, reasons)',
              '        reasons.add("CREATION_RECLAIM_AFTER_AS_OF")',
              '        return finish(row, f"PENDING_RECLAIM_{direction}", "CENSORED", "PENDING", confidence, reasons)',
              "",
          ]
          weekly.write_text("\n".join(lines) + "\n")

          daily = Path("python/range_library_memory/daily_trend_relationship.py")
          lines = daily.read_text().splitlines()
          start = find_line(lines, "t0 = canonical_time(t0)")
          end = find_line(lines, "formation_state = direction_state_at(context, t0)", start)
          lines[start:end] = [
              "    t0 = canonical_time(t0)",
              "    if parse_time(t0) > parse_time(cutoff):",
              '        return finish(row, "PENDING", "CENSORED", "PENDING", "low", reasons | {"DAILY_NOT_FORMED_AS_OF"})',
              '    row["daily_t0_formation_time"] = t0',
              "",
          ]
          for index, line in enumerate(lines):
              stripped = line.strip()
              if stripped == '"daily_t0_formation_time": daily["t0_formation_time"],':
                  lines[index] = '        "daily_t0_formation_time": None,'
              elif stripped == '"daily_t1_break_time": daily["t1_break_time"],':
                  lines[index] = '        "daily_t1_break_time": None,'
              elif stripped == '"daily_break_direction": daily["t1_break_direction"],':
                  lines[index] = '        "daily_break_direction": None,'
          daily.write_text("\n".join(lines) + "\n")
          PY
          python -m py_compile \
            python/range_library_memory/weekly_direction_context.py \
            python/range_library_memory/daily_trend_relationship.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add python/range_library_memory/weekly_direction_context.py \
                  python/range_library_memory/daily_trend_relationship.py
          git commit -m "fix: prevent as-of milestone hindsight leakage"
          git push origin HEAD:feat/weekly-direction-daily-relationship-v01
